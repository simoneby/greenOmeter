<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Edit: ' + ${produce.name}">Edit Produce</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
<main class="container">
    <a href="/admin/produce">&larr; Back to list</a>
    <h1 th:text="${produce.emoji} + ' ' + ${produce.name}">Produce</h1>

    <!-- Delete -->
    <form th:action="@{/admin/produce/{id}/delete(id=${produce.id})}" method="post" style="display:inline">
        <button type="submit" class="secondary outline" onclick="return confirm('Delete this produce?')">Delete</button>
    </form>

    <hr>

    <!-- Basic Info -->
    <h2>Basic Info</h2>
    <form th:action="@{/admin/produce/{id}(id=${produce.id})}" method="post">
        <div class="grid">
            <label>
                Name
                <input type="text" name="name" th:value="${updateDto.name}" required>
            </label>
            <label>
                Category
                <select name="category" id="category">
                    <option value="">-- Select --</option>
                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}" th:selected="${cat == updateDto.category}"></option>
                </select>
            </label>
        </div>
        <div class="grid">
            <label>
                Emoji
                <select name="emoji" id="emoji" required>
                    <option value="">-- Select category first --</option>
                </select>
                <input type="hidden" id="currentEmoji" th:value="${updateDto.emoji}">
            </label>
            <label>
                Color
                <select name="color">
                    <option value="">-- Select --</option>
                    <option th:each="c : ${colors}" th:value="${c}" th:text="${c}" th:selected="${c == updateDto.color}"></option>
                </select>
            </label>
        </div>
        <label>
            Description
            <textarea name="description" th:text="${updateDto.description}"></textarea>
        </label>
        <label>
            Tags (comma-separated)
            <input type="text" name="tags" th:value="${updateDto.tags}">
        </label>
        <button type="submit">Save Basic Info</button>
    </form>

    <hr>

    <!-- Translations -->
    <h2>Translations</h2>
    <table th:if="${not #lists.isEmpty(translations)}">
        <thead>
        <tr>
            <th>Language</th>
            <th>Name</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${translations}">
            <td th:text="${t.language}"></td>
            <td th:text="${t.name}"></td>
            <td>
                <form th:action="@{/admin/produce/{id}/translations/{lang}/delete(id=${produce.id},lang=${t.language})}" method="post" style="display:inline">
                    <button type="submit" class="secondary outline small">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <details>
        <summary>Add Translation</summary>
        <form th:action="@{/admin/produce/{id}/translations(id=${produce.id})}" method="post">
            <div class="grid">
                <label>
                    Language (e.g. "de", "fr")
                    <input type="text" name="language" required>
                </label>
                <label>
                    Translated Name
                    <input type="text" name="name" required>
                </label>
            </div>
            <button type="submit">Add Translation</button>
        </form>
    </details>

</main>
<script>
const emojisByCategory = {
    FRUIT:     ["🍎","🍊","🍋","🍇","🍉","🍑","🍒","🍌","🍍","🥭","🥝","🍐","🍈"],
    BERRY:     ["🫐","🍓","🍒"],
    VEGETABLE: ["🥕","🥦","🥬","🧅","🧄","🌽","🥒","🫑","🍆","🥔","🍅","🌶️"],
    MUSHROOM:  ["🍄"],
    LEGUME:    ["🫘","🥜"],
    SEED:      ["🌻","🌰"],
    HERB:      ["🌿","🍃"],
    NUT:       ["🥜","🌰"]
};
const categorySelect = document.getElementById("category");
const emojiSelect = document.getElementById("emoji");

function updateEmojis(selected) {
    emojiSelect.innerHTML = "";
    const emojis = emojisByCategory[categorySelect.value] || [];
    if (!emojis.length) {
        emojiSelect.innerHTML = '<option value="">-- Select category first --</option>';
        return;
    }
    emojis.forEach(function(e) {
        const opt = document.createElement("option");
        opt.value = e;
        opt.textContent = e;
        if (selected && e === selected) opt.selected = true;
        emojiSelect.appendChild(opt);
    });
}

categorySelect.addEventListener("change", function() { updateEmojis(); });
updateEmojis(document.getElementById("currentEmoji").value);
</script>
</body>
</html>
